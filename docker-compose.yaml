services:
  postgres:
    image: postgres:latest
    container_name: project-rewind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: project_rewind
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d project-rewind-dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  web-client:
    build:
      context: ./web-client
      dockerfile: Dockerfile
    container_name: project-rewind-web-client
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
